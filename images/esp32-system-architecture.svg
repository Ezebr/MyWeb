<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="espGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7043;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5C6BC0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C4DFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#26A69A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow4">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 标题 -->
  <text x="400" y="35" text-anchor="middle" fill="#1F2937" font-size="20" font-weight="bold">ESP32-P4 边缘 AI 智能门锁系统架构</text>
  
  <!-- 摄像头 -->
  <rect x="30" y="60" width="120" height="70" rx="12" fill="#37474F" filter="url(#shadow4)"/>
  <text x="90" y="90" text-anchor="middle" fill="white" font-size="13" font-weight="bold">MIPI CSI</text>
  <text x="90" y="110" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">SC2336 1024×600</text>
  
  <!-- 箭头 -->
  <line x1="150" y1="95" x2="190" y2="95" stroke="#90A4AE" stroke-width="2" marker-end="url(#arrowGray)"/>
  <defs><marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#90A4AE"/></marker></defs>
  
  <!-- ESP32-P4 芯片 -->
  <rect x="200" y="50" width="420" height="200" rx="16" fill="url(#espGrad)" filter="url(#shadow4)"/>
  <text x="410" y="80" text-anchor="middle" fill="white" font-size="16" font-weight="bold">ESP32-P4 (双核 RISC-V)</text>
  
  <!-- AI 流水线 -->
  <rect x="220" y="95" width="380" height="50" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="410" y="115" text-anchor="middle" fill="white" font-size="12" font-weight="bold">边缘 AI 流水线</text>
  
  <!-- 人脸检测 -->
  <rect x="230" y="155" width="100" height="40" rx="6" fill="url(#aiGrad)"/>
  <text x="280" y="180" text-anchor="middle" fill="white" font-size="11" font-weight="bold">人脸检测</text>
  
  <!-- 活体检测 -->
  <rect x="350" y="155" width="100" height="40" rx="6" fill="url(#aiGrad)"/>
  <text x="400" y="180" text-anchor="middle" fill="white" font-size="11" font-weight="bold">活体检测</text>
  
  <!-- 人脸识别 -->
  <rect x="470" y="155" width="100" height="40" rx="6" fill="url(#aiGrad)"/>
  <text x="520" y="180" text-anchor="middle" fill="white" font-size="11" font-weight="bold">人脸识别</text>
  
  <!-- AI 箭头 -->
  <line x1="330" y1="175" x2="350" y2="175" stroke="white" stroke-width="1.5"/>
  <line x1="450" y1="175" x2="470" y2="175" stroke="white" stroke-width="1.5"/>
  
  <!-- 门锁控制 -->
  <rect x="220" y="210" width="380" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="410" y="230" text-anchor="middle" fill="white" font-size="11">门锁控制逻辑 → 解锁/拒绝</text>
  
  <!-- WiFi 模块 -->
  <rect x="650" y="60" width="120" height="55" rx="10" fill="url(#ioGrad)" filter="url(#shadow4)"/>
  <text x="710" y="83" text-anchor="middle" fill="white" font-size="12" font-weight="bold">WiFi</text>
  <text x="710" y="100" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">NVS 持久化</text>
  
  <!-- MQTT -->
  <rect x="650" y="125" width="120" height="55" rx="10" fill="url(#ioGrad)" filter="url(#shadow4)"/>
  <text x="710" y="148" text-anchor="middle" fill="white" font-size="12" font-weight="bold">MQTT</text>
  <text x="710" y="165" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">智能家居控制</text>
  
  <!-- 语音模块 -->
  <rect x="650" y="190" width="120" height="55" rx="10" fill="url(#ioGrad)" filter="url(#shadow4)"/>
  <text x="710" y="213" text-anchor="middle" fill="white" font-size="12" font-weight="bold">语音交互</text>
  <text x="710" y="230" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">ASR + LLM + TTS</text>
  
  <!-- LCD 显示 -->
  <rect x="30" y="270" width="160" height="60" rx="10" fill="#455A64" filter="url(#shadow4)"/>
  <text x="110" y="295" text-anchor="middle" fill="white" font-size="12" font-weight="bold">LVGL 触摸屏</text>
  <text x="110" y="315" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">UI 显示 + 操作</text>
  
  <!-- 远程监控 -->
  <rect x="250" y="270" width="160" height="60" rx="10" fill="#455A64" filter="url(#shadow4)"/>
  <text x="330" y="295" text-anchor="middle" fill="white" font-size="12" font-weight="bold">远程监控</text>
  <text x="330" y="315" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">JPEG 编码 + HTTP</text>
  
  <!-- 连接线 -->
  <line x1="410" y1="240" x2="110" y2="270" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="410" y1="240" x2="330" y2="270" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="620" y1="120" x2="650" y2="87" stroke="#90A4AE" stroke-width="1.5"/>
  <line x1="620" y1="175" x2="650" y2="152" stroke="#90A4AE" stroke-width="1.5"/>
  <line x1="620" y1="210" x2="650" y2="217" stroke="#90A4AE" stroke-width="1.5"/>
  
  <!-- 云服务 -->
  <rect x="520" y="270" width="260" height="60" rx="12" fill="#1565C0" filter="url(#shadow4)"/>
  <text x="650" y="295" text-anchor="middle" fill="white" font-size="12" font-weight="bold">云服务</text>
  <text x="650" y="315" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">火山引擎 ASR/LLM + MQTT Broker + 监控服务器</text>
  
  <!-- 云连接 -->
  <line x1="710" y1="120" x2="710" y2="270" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="710" y1="180" x2="710" y2="270" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="410" y1="300" x2="520" y2="300" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="6,3"/>
  
  <!-- 核心分配说明 -->
  <rect x="30" y="360" width="740" height="120" rx="12" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="400" y="390" text-anchor="middle" fill="#1F2937" font-size="14" font-weight="bold">FreeRTOS 双核任务分配</text>
  
  <rect x="50" y="405" width="340" height="60" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="220" y="425" text-anchor="middle" fill="#1565C0" font-size="12" font-weight="bold">Core 0 - I/O 密集</text>
  <text x="220" y="450" text-anchor="middle" fill="#37474F" font-size="10">摄像头采集 · LCD显示 · WiFi/MQTT · 远程监控 · 语音</text>
  
  <rect x="420" y="405" width="340" height="60" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="590" y="425" text-anchor="middle" fill="#7B1FA2" font-size="12" font-weight="bold">Core 1 - AI 推理</text>
  <text x="590" y="450" text-anchor="middle" fill="#37474F" font-size="10">人脸检测 CNN · 活体检测 · 人脸识别特征提取</text>
</svg>