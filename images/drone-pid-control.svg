<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <defs>
    <linearGradient id="posGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="attGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DB2777;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EC4899"/>
    </marker>
  </defs>
  
  <!-- 标题 -->
  <text x="450" y="30" text-anchor="middle" fill="#1F2937" font-size="18" font-weight="bold">串级 PID 控制架构</text>
  
  <!-- 位置环 (100Hz) -->
  <rect x="30" y="60" width="240" height="230" rx="16" fill="url(#posGrad)" filter="url(#shadow2)"/>
  <text x="150" y="95" text-anchor="middle" fill="white" font-size="15" font-weight="bold">位置环 (100Hz)</text>
  
  <rect x="60" y="115" width="180" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="150" y="140" text-anchor="middle" fill="white" font-size="13">期望位置</text>
  
  <text x="150" y="175" text-anchor="middle" fill="white" font-size="24">↓</text>
  
  <rect x="60" y="190" width="180" height="40" rx="8" fill="rgba(255,255,255,0.3)"/>
  <text x="150" y="215" text-anchor="middle" fill="white" font-size="13" font-weight="bold">位置 PID</text>
  
  <text x="150" y="250" text-anchor="middle" fill="white" font-size="12">反馈：光流 / SLAM</text>
  
  <!-- 箭头 1 -->
  <line x1="280" y1="175" x2="340" y2="175" stroke="#3B82F6" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="310" y="160" text-anchor="middle" fill="#4B5563" font-size="11">角度设定值</text>
  
  <!-- 姿态角环 (200Hz) -->
  <rect x="350" y="60" width="240" height="230" rx="16" fill="url(#attGrad)" filter="url(#shadow2)"/>
  <text x="470" y="95" text-anchor="middle" fill="white" font-size="15" font-weight="bold">姿态角环 (200Hz)</text>
  
  <rect x="380" y="115" width="180" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="470" y="140" text-anchor="middle" fill="white" font-size="13">期望角度</text>
  
  <text x="470" y="175" text-anchor="middle" fill="white" font-size="24">↓</text>
  
  <rect x="380" y="190" width="180" height="40" rx="8" fill="rgba(255,255,255,0.3)"/>
  <text x="470" y="215" text-anchor="middle" fill="white" font-size="13" font-weight="bold">角度 PID</text>
  
  <text x="470" y="250" text-anchor="middle" fill="white" font-size="12">反馈：融合角度</text>
  
  <!-- 箭头 2 -->
  <line x1="600" y1="175" x2="660" y2="175" stroke="#8B5CF6" stroke-width="3" marker-end="url(#arrowPurple)"/>
  <text x="630" y="160" text-anchor="middle" fill="#4B5563" font-size="11">角速率设定值</text>
  
  <!-- 角速率环 (200Hz) -->
  <rect x="670" y="60" width="200" height="230" rx="16" fill="url(#rateGrad)" filter="url(#shadow2)"/>
  <text x="770" y="95" text-anchor="middle" fill="white" font-size="15" font-weight="bold">角速率环 (200Hz)</text>
  
  <rect x="695" y="115" width="150" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="770" y="140" text-anchor="middle" fill="white" font-size="13">期望角速率</text>
  
  <text x="770" y="175" text-anchor="middle" fill="white" font-size="24">↓</text>
  
  <rect x="695" y="190" width="150" height="40" rx="8" fill="rgba(255,255,255,0.3)"/>
  <text x="770" y="215" text-anchor="middle" fill="white" font-size="13" font-weight="bold">角速率 PID</text>
  
  <text x="770" y="250" text-anchor="middle" fill="white" font-size="12">反馈：陀螺仪</text>
  
  <!-- PWM 输出 -->
  <line x1="770" y1="270" x2="770" y2="310" stroke="#EC4899" stroke-width="3"/>
  <rect x="700" y="310" width="140" height="35" rx="8" fill="#1F2937"/>
  <text x="770" y="333" text-anchor="middle" fill="white" font-size="13" font-weight="bold">PWM → 电机</text>
</svg>