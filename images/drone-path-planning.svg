<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450">
  <defs>
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 标题 -->
  <text x="250" y="30" text-anchor="middle" fill="#1F2937" font-size="18" font-weight="bold">BFS 最短路径 + 蛇形遍历</text>
  <text x="250" y="50" text-anchor="middle" fill="#6B7280" font-size="13">9×7 网格地图 · 禁飞区避障 · 全覆盖巡查</text>
  
  <!-- 网格背景 -->
  <g transform="translate(50, 70)">
    <!-- 网格线 -->
    <g stroke="#E5E7EB" stroke-width="1">
      <!-- 垂直线 -->
      <line x1="0" y1="0" x2="0" y2="280"/>
      <line x1="40" y1="0" x2="40" y2="280"/>
      <line x1="80" y1="0" x2="80" y2="280"/>
      <line x1="120" y1="0" x2="120" y2="280"/>
      <line x1="160" y1="0" x2="160" y2="280"/>
      <line x1="200" y1="0" x2="200" y2="280"/>
      <line x1="240" y1="0" x2="240" y2="280"/>
      <line x1="280" y1="0" x2="280" y2="280"/>
      <line x1="320" y1="0" x2="320" y2="280"/>
      <line x1="360" y1="0" x2="360" y2="280"/>
      <!-- 水平线 -->
      <line x1="0" y1="0" x2="360" y2="0"/>
      <line x1="0" y1="40" x2="360" y2="40"/>
      <line x1="0" y1="80" x2="360" y2="80"/>
      <line x1="0" y1="120" x2="360" y2="120"/>
      <line x1="0" y1="160" x2="360" y2="160"/>
      <line x1="0" y1="200" x2="360" y2="200"/>
      <line x1="0" y1="240" x2="360" y2="240"/>
      <line x1="0" y1="280" x2="360" y2="280"/>
    </g>
    
    <!-- 禁飞区 (红色) -->
    <rect x="160" y="200" width="40" height="40" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
    <text x="180" y="225" text-anchor="middle" fill="#DC2626" font-size="11" font-weight="bold">禁飞</text>
    <rect x="200" y="200" width="40" height="40" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
    <text x="220" y="225" text-anchor="middle" fill="#DC2626" font-size="11" font-weight="bold">禁飞</text>
    <rect x="240" y="200" width="40" height="40" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
    <text x="260" y="225" text-anchor="middle" fill="#DC2626" font-size="11" font-weight="bold">禁飞</text>
    
    <!-- 起飞区 (绿色) -->
    <rect x="320" y="240" width="40" height="40" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
    <text x="340" y="265" text-anchor="middle" fill="#059669" font-size="10" font-weight="bold">起飞</text>
    
    <!-- 蛇形路径 -->
    <polyline points="340,260 300,260 260,260 220,260 180,260 140,260 100,260 60,260 20,260
                       20,220 60,220 100,220 140,220 180,220 220,220 260,220 300,220 340,220
                       340,180 300,180 260,180 220,180 180,180 140,180 100,180 60,180 20,180
                       20,140 60,140 100,140 140,140 180,140 220,140 260,140 300,140 340,140
                       340,100 300,100 260,100 220,100 180,100 140,100 100,100 60,100 20,100
                       20,60 60,60 100,60 140,60 180,60 220,60 260,60 300,60 340,60
                       340,20 300,20 260,20 220,20 180,20 140,20 100,20 60,20 20,20"
              fill="none" stroke="url(#pathGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
              stroke-dasharray="8,4" opacity="0.8"/>
    
    <!-- BFS 绕行路径示意 -->
    <path d="M 140,220 L 140,260 L 100,260 L 100,220" fill="none" stroke="#F97316" stroke-width="3" stroke-linecap="round"/>
    <text x="120" y="250" text-anchor="middle" fill="#F97316" font-size="10" font-weight="bold">BFS绕行</text>
    
    <!-- 路径点标记 -->
    <circle cx="340" cy="260" r="6" fill="#10B981"/>
    <text x="340" y="275" text-anchor="middle" fill="#059669" font-size="9">起点</text>
    
    <circle cx="20" cy="20" r="6" fill="#3B82F6"/>
    <text x="20" y="15" text-anchor="middle" fill="#3B82F6" font-size="9">终点</text>
  </g>
  
  <!-- 图例 -->
  <g transform="translate(50, 370)">
    <rect x="0" y="0" width="15" height="15" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
    <text x="20" y="12" fill="#4B5563" font-size="12">禁飞区</text>
    
    <rect x="80" y="0" width="15" height="15" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
    <text x="100" y="12" fill="#4B5563" font-size="12">起飞区</text>
    
    <line x1="170" y1="7" x2="200" y2="7" stroke="url(#pathGrad)" stroke-width="3" stroke-dasharray="5,3"/>
    <text x="210" y="12" fill="#4B5563" font-size="12">蛇形遍历路径</text>
    
    <line x1="310" y1="7" x2="340" y2="7" stroke="#F97316" stroke-width="3"/>
    <text x="350" y="12" fill="#4B5563" font-size="12">BFS 绕行</text>
  </g>
  
  <!-- 算法说明 -->
  <g transform="translate(50, 400)">
    <text x="0" y="0" fill="#4B5563" font-size="12">算法：蛇形扫描生成目标序列 → BFS 计算相邻目标最短路径 → 拼接完整巡查路径 → 返回起点</text>
  </g>
</svg>