<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <text x="250" y="30" text-anchor="middle" fill="#1F2937" font-size="18" font-weight="bold">贪心最近邻全覆盖路径规划</text>

  <g transform="translate(70, 60)">
    <g stroke="#E5E7EB" stroke-width="1">
      <line x1="0" y1="0" x2="0" y2="280"/>
      <line x1="40" y1="0" x2="40" y2="280"/>
      <line x1="80" y1="0" x2="80" y2="280"/>
      <line x1="120" y1="0" x2="120" y2="280"/>
      <line x1="160" y1="0" x2="160" y2="280"/>
      <line x1="200" y1="0" x2="200" y2="280"/>
      <line x1="240" y1="0" x2="240" y2="280"/>
      <line x1="280" y1="0" x2="280" y2="280"/>
      <line x1="320" y1="0" x2="320" y2="280"/>
      <line x1="360" y1="0" x2="360" y2="280"/>
      <line x1="0" y1="0" x2="360" y2="0"/>
      <line x1="0" y1="40" x2="360" y2="40"/>
      <line x1="0" y1="80" x2="360" y2="80"/>
      <line x1="0" y1="120" x2="360" y2="120"/>
      <line x1="0" y1="160" x2="360" y2="160"/>
      <line x1="0" y1="200" x2="360" y2="200"/>
      <line x1="0" y1="240" x2="360" y2="240"/>
      <line x1="0" y1="280" x2="360" y2="280"/>
    </g>

    <rect x="160" y="120" width="40" height="40" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
    <text x="180" y="144" text-anchor="middle" fill="#DC2626" font-size="11" font-weight="bold">禁飞</text>
    <rect x="200" y="120" width="40" height="40" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
    <text x="220" y="144" text-anchor="middle" fill="#DC2626" font-size="11" font-weight="bold">禁飞</text>
    <rect x="240" y="120" width="40" height="40" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
    <text x="260" y="144" text-anchor="middle" fill="#DC2626" font-size="11" font-weight="bold">禁飞</text>

    <rect x="320" y="240" width="40" height="40" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>

    <!-- 工作路径：蓝色加粗 -->
    <polyline points="340,260 340,20 20,20 20,60 300,60 300,100 20,100 20,140 140,140 140,180 
                      20,180 20,220 180,220 180,180 300,180 300,140"
              fill="none" stroke="#6366F1" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"
              stroke-dasharray="8,4" opacity="0.9"/>

    <!-- 方向箭头（蓝色） -->
    <polygon points="336,144 344,144 340,136" fill="#6366F1" />
    <polygon points="184,16 184,24 176,20" fill="#6366F1" />
    <polygon points="156,56 156,64 164,60" fill="#6366F1" />
    <polygon points="164,96 164,104 156,100" fill="#6366F1" />
    <polygon points="76,136 76,144 84,140" fill="#6366F1" />
    <polygon points="84,176 84,184 76,180" fill="#6366F1" />
    <polygon points="96,216 96,224 104,220" fill="#6366F1" />
    <polygon points="236,176 236,184 244,180" fill="#6366F1" />
    <polygon points="296,164 304,164 300,156" fill="#6366F1" />

    <!-- BFS 退回段：橙色变细，与蓝色完全重叠（中心对齐） -->
    <polyline points="304,140 304,180" fill="none" stroke="#F97316" stroke-width="2" stroke-linecap="round" />
    <polygon points="300,156 308,156 304,164" fill="#F97316" />

    <!-- 工作路径继续：蓝色加粗 -->
    <polyline points="300,180 300,220 220,220 220,260 20,260"
              fill="none" stroke="#6366F1" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"
              stroke-dasharray="8,4" opacity="0.9"/>

    <!-- 方向箭头（蓝色） -->
    <polygon points="296,196 304,196 300,204" fill="#6366F1" />
    <polygon points="264,216 264,224 256,220" fill="#6366F1" />
    <polygon points="216,236 224,236 220,244" fill="#6366F1" />
    <polygon points="124,256 124,264 116,260" fill="#6366F1" />
    <circle cx="20" cy="260" r="4" fill="#6366F1"/>

    <!-- BFS 扫尾与返航：橙色变细，与蓝色完全重叠（中心对齐） -->
    <polyline points="20,264 220,264" fill="none" stroke="#F97316" stroke-width="2" stroke-linecap="round" />
    <polygon points="116,260 116,268 124,264" fill="#F97316" />

    <!-- 工作路径继续：蓝色加粗 -->
    <polyline points="220,260 300,260" fill="none" stroke="#6366F1" stroke-width="6" stroke-linecap="round" stroke-dasharray="8,4" opacity="0.9"/>
    <polygon points="256,256 256,264 264,260" fill="#6366F1" />

    <!-- 归位段：橙色变细，与蓝色完全重叠（中心对齐） -->
    <polyline points="300,264 340,264" fill="none" stroke="#F97316" stroke-width="2" stroke-linecap="round" />
    <polygon points="316,260 316,268 324,264" fill="#F97316" />

    <circle cx="340" cy="260" r="6" fill="#10B981"/>
    <text x="340" y="285" text-anchor="middle" fill="#059669" font-size="10" font-weight="bold">起点/终点</text>
  </g>

  <g transform="translate(70, 360)">
    <rect x="0" y="0" width="15" height="15" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
    <text x="20" y="12" fill="#4B5563" font-size="12">禁飞区</text>

    <rect x="80" y="0" width="15" height="15" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
    <text x="100" y="12" fill="#4B5563" font-size="12">起飞/降落区</text>

    <line x1="180" y1="7" x2="210" y2="7" stroke="#6366F1" stroke-width="4" stroke-dasharray="5,3"/>
    <text x="220" y="12" fill="#4B5563" font-size="12">工作路径 (首次清扫)</text>

    <line x1="180" y1="27" x2="210" y2="27" stroke="#F97316" stroke-width="2"/>
    <text x="220" y="32" fill="#4B5563" font-size="12">BFS 绕路/返航 (重叠路段)</text>
  </g>
</svg>