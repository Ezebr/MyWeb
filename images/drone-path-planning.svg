<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" font-family="'Segoe UI','Helvetica Neue',sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#95a5a6"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">贪心算法轨迹图（螺旋逼近死角 + BFS 返航扫尾）</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#7f8c8d">起点：右下角(6,8) → 贪心螺旋遍历 → BFS 扫尾遗漏死角 → 返回起点</text>

  <!-- Grid 7x9 -->
  <g transform="translate(100,80)">
    <!-- Grid lines -->
    <g stroke="#ddd" stroke-width="1" fill="none">
      <!-- Rows -->
      <line x1="0" y1="0" x2="540" y2="0"/>
      <line x1="0" y1="60" x2="540" y2="60"/>
      <line x1="0" y1="120" x2="540" y2="120"/>
      <line x1="0" y1="180" x2="540" y2="180"/>
      <line x1="0" y1="240" x2="540" y2="240"/>
      <line x1="0" y1="300" x2="540" y2="300"/>
      <line x1="0" y1="360" x2="540" y2="360"/>
      <!-- Cols -->
      <line x1="0" y1="0" x2="0" y2="360"/>
      <line x1="60" y1="0" x2="60" y2="360"/>
      <line x1="120" y1="0" x2="120" y2="360"/>
      <line x1="180" y1="0" x2="180" y2="360"/>
      <line x1="240" y1="0" x2="240" y2="360"/>
      <line x1="300" y1="0" x2="300" y2="360"/>
      <line x1="360" y1="0" x2="360" y2="360"/>
      <line x1="420" y1="0" x2="420" y2="360"/>
      <line x1="480" y1="0" x2="480" y2="360"/>
      <line x1="540" y1="0" x2="540" y2="360"/>
    </g>

    <!-- Forbidden zones (red X) -->
    <g fill="#e74c3c" opacity="0.6">
      <rect x="120" y="0" width="60" height="60" rx="4"/>
      <text x="150" y="38" text-anchor="middle" font-size="28" fill="white" font-weight="bold">X</text>
      <rect x="240" y="120" width="60" height="60" rx="4"/>
      <text x="270" y="158" text-anchor="middle" font-size="28" fill="white" font-weight="bold">X</text>
      <rect x="420" y="300" width="60" height="60" rx="4"/>
      <text x="450" y="338" text-anchor="middle" font-size="28" fill="white" font-weight="bold">X</text>
    </g>

    <!-- Start position -->
    <g>
      <rect x="480" y="300" width="60" height="60" rx="4" fill="#27ae60" opacity="0.5"/>
      <text x="510" y="335" text-anchor="middle" font-size="12" fill="white" font-weight="bold">起点</text>
    </g>

    <!-- Greedy spiral path (Phase 1) - main coverage -->
    <g stroke="#e74c3c" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)">
      <!-- Row 6 (bottom): right to left -->
      <line x1="510" y1="330" x2="450" y2="330"/>
      <line x1="450" y1="330" x2="390" y2="330"/>
      <line x1="390" y1="330" x2="330" y2="330"/>
      <line x1="330" y1="330" x2="270" y2="330"/>
      <line x1="270" y1="330" x2="210" y2="330"/>
      <line x1="210" y1="330" x2="150" y2="330"/>
      <line x1="150" y1="330" x2="90" y2="330"/>
      <line x1="90" y1="330" x2="30" y2="330"/>
      
      <!-- Up -->
      <line x1="30" y1="330" x2="30" y2="270"/>
      
      <!-- Row 5: left to right -->
      <line x1="30" y1="270" x2="90" y2="270"/>
      <line x1="90" y1="270" x2="150" y2="270"/>
      <line x1="150" y1="270" x2="210" y2="270"/>
      <line x1="210" y1="270" x2="270" y2="270"/>
      <line x1="270" y1="270" x2="330" y2="270"/>
      <line x1="330" y1="270" x2="390" y2="270"/>
      <line x1="390" y1="270" x2="450" y2="270"/>
      <line x1="450" y1="270" x2="510" y2="270"/>
      
      <!-- Up -->
      <line x1="510" y1="270" x2="510" y2="210"/>
      
      <!-- Row 4: right to left (skip forbidden 420,300) -->
      <line x1="510" y1="210" x2="450" y2="210"/>
      <line x1="450" y1="210" x2="390" y2="210"/>
      <line x1="390" y1="210" x2="330" y2="210"/>
      <line x1="330" y1="210" x2="210" y2="210"/>
      <line x1="210" y1="210" x2="150" y2="210"/>
      <line x1="150" y1="210" x2="90" y2="210"/>
      <line x1="90" y1="210" x2="30" y2="210"/>
      
      <!-- Up -->
      <line x1="30" y1="210" x2="30" y2="150"/>
      
      <!-- Row 3: left to right (skip forbidden 240,120) -->
      <line x1="30" y1="150" x2="90" y2="150"/>
      <line x1="90" y1="150" x2="150" y2="150"/>
      <line x1="150" y1="150" x2="210" y2="150"/>
      <line x1="210" y1="150" x2="330" y2="150"/>
      <line x1="330" y1="150" x2="390" y2="150"/>
      <line x1="390" y1="150" x2="450" y2="150"/>
      <line x1="450" y1="150" x2="510" y2="150"/>
      
      <!-- Up -->
      <line x1="510" y1="150" x2="510" y2="90"/>
      
      <!-- Row 2: right to left -->
      <line x1="510" y1="90" x2="450" y2="90"/>
      <line x1="450" y1="90" x2="390" y2="90"/>
      <line x1="390" y1="90" x2="330" y2="90"/>
      <line x1="330" y1="90" x2="270" y2="90"/>
      <line x1="270" y1="90" x2="210" y2="90"/>
      <line x1="210" y1="90" x2="90" y2="90"/>
      <line x1="90" y1="90" x2="30" y2="90"/>
      
      <!-- Up -->
      <line x1="30" y1="90" x2="30" y2="30"/>
      
      <!-- Row 1 (top): left to right (skip forbidden 120,0) -->
      <line x1="30" y1="30" x2="90" y2="30"/>
      <line x1="90" y1="30" x2="210" y2="30"/>
      <line x1="210" y1="30" x2="270" y2="30"/>
      <line x1="270" y1="30" x2="330" y2="30"/>
      <line x1="330" y1="30" x2="390" y2="30"/>
      <line x1="390" y1="30" x2="450" y2="30"/>
      <line x1="450" y1="30" x2="510" y2="30"/>
    </g>

    <!-- BFS sweep tail (Phase 2) - blue dashed -->
    <g stroke="#2980b9" stroke-width="2.5" fill="none" stroke-dasharray="8,4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead-blue)">
      <!-- From end of phase1, BFS to missed dead-end cells -->
      <line x1="510" y1="30" x2="510" y2="30" opacity="0"/>
      <!-- Go to missed cell near forbidden zone -->
      <line x1="510" y1="30" x2="450" y2="90"/>
      <line x1="450" y1="90" x2="390" y2="90"/>
      <!-- Cover remaining cells in row 2 -->
      <line x1="390" y1="90" x2="330" y2="150"/>
      <line x1="330" y1="150" x2="270" y2="150"/>
      <!-- Around forbidden 240,120 -->
      <line x1="270" y1="150" x2="270" y2="210"/>
      <line x1="270" y1="210" x2="330" y2="270"/>
      <!-- Continue sweep -->
      <line x1="330" y1="270" x2="390" y2="210"/>
      <line x1="390" y1="210" x2="450" y2="270"/>
      <line x1="450" y1="270" x2="450" y2="330"/>
      <line x1="450" y1="330" x2="390" y2="330"/>
      <!-- Around forbidden 420,300 -->
      <line x1="390" y1="330" x2="330" y2="330"/>
      <line x1="330" y1="330" x2="270" y2="330"/>
    </g>

    <!-- Return to start (Phase 3) - green -->
    <g stroke="#27ae60" stroke-width="3" fill="none" stroke-dasharray="12,5" stroke-linecap="round" marker-end="url(#arrowhead-green)">
      <line x1="270" y1="330" x2="330" y2="330"/>
      <line x1="330" y1="330" x2="390" y2="330"/>
      <line x1="390" y1="330" x2="450" y2="330"/>
      <line x1="450" y1="330" x2="510" y2="330"/>
    </g>

    <!-- Cell labels -->
    <g font-size="11" fill="#555" text-anchor="middle">
      <text x="30" y="38">1,0</text>
      <text x="90" y="38">2,0</text>
      <text x="150" y="38">3,0</text>
      <text x="210" y="38">4,0</text>
      <text x="270" y="38">5,0</text>
      <text x="330" y="38">6,0</text>
      <text x="390" y="38">7,0</text>
      <text x="450" y="38">8,0</text>
      <text x="510" y="38">9,0</text>
      
      <text x="30" y="98">1,1</text>
      <text x="90" y="98">2,1</text>
      <text x="150" y="98">3,1</text>
      <text x="210" y="98">4,1</text>
      <text x="270" y="98">5,1</text>
      <text x="330" y="98">6,1</text>
      <text x="390" y="98">7,1</text>
      <text x="450" y="98">8,1</text>
      <text x="510" y="98">9,1</text>
      
      <text x="30" y="158">1,2</text>
      <text x="90" y="158">2,2</text>
      <text x="150" y="158">3,2</text>
      <text x="210" y="158">4,2</text>
      <text x="330" y="158">6,2</text>
      <text x="390" y="158">7,2</text>
      <text x="450" y="158">8,2</text>
      <text x="510" y="158">9,2</text>
      
      <text x="30" y="218">1,3</text>
      <text x="90" y="218">2,3</text>
      <text x="150" y="218">3,3</text>
      <text x="210" y="218">4,3</text>
      <text x="270" y="218">5,3</text>
      <text x="330" y="218">6,3</text>
      <text x="390" y="218">7,3</text>
      <text x="450" y="218">8,3</text>
      <text x="510" y="218">9,3</text>
      
      <text x="30" y="278">1,4</text>
      <text x="90" y="278">2,4</text>
      <text x="150" y="278">3,4</text>
      <text x="210" y="278">4,4</text>
      <text x="270" y="278">5,4</text>
      <text x="330" y="278">6,4</text>
      <text x="390" y="278">7,4</text>
      <text x="450" y="278">8,4</text>
      <text x="510" y="278">9,4</text>
      
      <text x="30" y="338">1,5</text>
      <text x="90" y="338">2,5</text>
      <text x="150" y="338">3,5</text>
      <text x="210" y="338">4,5</text>
      <text x="270" y="338">5,5</text>
      <text x="330" y="338">6,5</text>
      <text x="390" y="338">7,5</text>
      <text x="450" y="338">8,5</text>
      <text x="510" y="338" fill="#27ae60" font-weight="bold">9,5</text>
    </g>

    <!-- Column headers -->
    <g font-size="11" fill="#7f8c8d" text-anchor="middle">
      <text x="30" y="-8">0</text>
      <text x="90" y="-8">1</text>
      <text x="150" y="-8">2</text>
      <text x="210" y="-8">3</text>
      <text x="270" y="-8">4</text>
      <text x="330" y="-8">5</text>
      <text x="390" y="-8">6</text>
      <text x="450" y="-8">7</text>
      <text x="510" y="-8">8</text>
    </g>

    <!-- Row headers -->
    <g font-size="11" fill="#7f8c8d" text-anchor="end">
      <text x="-8" y="35">0</text>
      <text x="-8" y="95">1</text>
      <text x="-8" y="155">2</text>
      <text x="-8" y="215">3</text>
      <text x="-8" y="275">4</text>
      <text x="-8" y="335">5</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(100,470)">
    <rect x="0" y="0" width="240" height="120" rx="6" fill="#f8f9fa" stroke="#ddd"/>
    <text x="10" y="22" font-size="13" font-weight="bold" fill="#2c3e50">图例说明</text>
    
    <line x1="10" y1="40" x2="40" y2="40" stroke="#e74c3c" stroke-width="3"/>
    <text x="48" y="44" font-size="12" fill="#555">贪心螺旋遍历（主路径）</text>
    
    <line x1="10" y1="62" x2="40" y2="62" stroke="#2980b9" stroke-width="2.5" stroke-dasharray="8,4"/>
    <text x="48" y="66" font-size="12" fill="#555">BFS 扫尾死角（补充路径）</text>
    
    <line x1="10" y1="84" x2="40" y2="84" stroke="#27ae60" stroke-width="3" stroke-dasharray="12,5"/>
    <text x="48" y="88" font-size="12" fill="#555">BFS 返航路径</text>
    
    <rect x="10" y="98" width="20" height="14" rx="2" fill="#e74c3c" opacity="0.6"/>
    <text x="48" y="110" font-size="12" fill="#555">禁飞区</text>
  </g>

  <!-- Algorithm stats -->
  <g transform="translate(420,470)">
    <rect x="0" y="0" width="320" height="120" rx="6" fill="#f8f9fa" stroke="#ddd"/>
    <text x="10" y="22" font-size="13" font-weight="bold" fill="#2c3e50">算法性能</text>
    <text x="10" y="45" font-size="12" fill="#555">总网格数：60 格（9×7 - 3×禁飞区 = 63-3 = 60 可巡查）</text>
    <text x="10" y="65" font-size="12" fill="#555">识别准确率：70%+</text>
    <text x="10" y="85" font-size="12" fill="#555">巡查时间：500 秒内完成全覆盖</text>
    <text x="10" y="105" font-size="12" fill="#555">算法策略：贪心螺旋 + BFS 返航扫尾，确保无遗漏</text>
  </g>

  <!-- Algorithm flow -->
  <g transform="translate(100,610)">
    <text x="0" y="0" font-size="13" font-weight="bold" fill="#2c3e50">算法流程：</text>
    <text x="0" y="20" font-size="12" fill="#555">① 贪心选择最近可走格 → ② 遇死角用BFS补扫 → ③ 全部覆盖后BFS返回起点</text>
  </g>
</svg>