<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#42A5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C4DFF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow5">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" fill="#1F2937" font-size="18" font-weight="bold">边缘 AI 流水线：人脸检测 → 活体检测 → 人脸识别</text>
  
  <!-- 原始图像 -->
  <rect x="20" y="60" width="110" height="80" rx="10" fill="#37474F" filter="url(#shadow5)"/>
  <text x="75" y="90" text-anchor="middle" fill="white" font-size="12" font-weight="bold">MIPI CSI</text>
  <text x="75" y="110" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">1024×600</text>
  <text x="75" y="125" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">RGB565</text>
  
  <!-- 箭头 -->
  <line x1="130" y1="100" x2="160" y2="100" stroke="#42A5F5" stroke-width="2" marker-end="url(#arrowBlue2)"/>
  <defs><marker id="arrowBlue2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#42A5F5"/></marker></defs>
  
  <!-- 人脸检测 -->
  <rect x="170" y="55" width="130" height="90" rx="12" fill="url(#pipeGrad)" filter="url(#shadow5)"/>
  <text x="235" y="80" text-anchor="middle" fill="white" font-size="13" font-weight="bold">人脸检测</text>
  <text x="235" y="100" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">esp-dl CNN</text>
  <text x="235" y="115" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">INT8 量化</text>
  <text x="235" y="130" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">输出: 人脸边界框</text>
  
  <!-- 箭头 + 检测结果 -->
  <line x1="300" y1="100" x2="340" y2="100" stroke="#42A5F5" stroke-width="2" marker-end="url(#arrowBlue2)"/>
  <text x="320" y="90" text-anchor="middle" fill="#6B7280" font-size="9">裁剪人脸</text>
  
  <!-- 活体检测 -->
  <rect x="350" y="55" width="130" height="90" rx="12" fill="#FF7043" filter="url(#shadow5)"/>
  <text x="415" y="80" text-anchor="middle" fill="white" font-size="13" font-weight="bold">活体检测</text>
  <text x="415" y="100" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">MobileNetV1 ×0.5</text>
  <text x="415" y="115" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">96×96 INT8 ~160KB</text>
  <text x="415" y="130" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">输出: P(live) / P(spoof)</text>
  
  <!-- 判断分支 -->
  <line x1="480" y1="100" x2="520" y2="100" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrowGreen2)"/>
  <defs><marker id="arrowGreen2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4CAF50"/></marker></defs>
  <text x="500" y="90" text-anchor="middle" fill="#4CAF50" font-size="9" font-weight="bold">通过</text>
  
  <!-- 人脸识别 -->
  <rect x="530" y="55" width="130" height="90" rx="12" fill="#7C4DFF" filter="url(#shadow5)"/>
  <text x="595" y="80" text-anchor="middle" fill="white" font-size="13" font-weight="bold">人脸识别</text>
  <text x="595" y="100" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">esp-dl 特征提取</text>
  <text x="595" y="115" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="10">128维特征向量</text>
  <text x="595" y="130" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">余弦相似度匹配</text>
  
  <!-- 输出结果 -->
  <line x1="660" y1="100" x2="700" y2="100" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrowGreen2)"/>
  
  <!-- 匹配成功 -->
  <rect x="700" y="55" width="80" height="40" rx="8" fill="#4CAF50"/>
  <text x="740" y="80" text-anchor="middle" fill="white" font-size="11" font-weight="bold">解锁</text>
  
  <!-- 未匹配 -->
  <rect x="700" y="105" width="80" height="40" rx="8" fill="#F44336"/>
  <text x="740" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="bold">拒绝</text>
  
  <!-- 活体检测失败分支 -->
  <line x1="415" y1="145" x2="415" y2="180" stroke="#F44336" stroke-width="2"/>
  <line x1="415" y1="180" x2="300" y2="180" stroke="#F44336" stroke-width="2" marker-end="url(#arrowRed2)"/>
  <defs><marker id="arrowRed2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#F44336"/></marker></defs>
  <rect x="170" y="165" width="130" height="30" rx="6" fill="#F44336"/>
  <text x="235" y="185" text-anchor="middle" fill="white" font-size="10" font-weight="bold">拒绝: "请使用真人"</text>
  
  <!-- 模型训练流程 -->
  <rect x="20" y="220" width="760" height="110" rx="12" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="400" y="250" text-anchor="middle" fill="#1F2937" font-size="14" font-weight="bold">活体检测模型训练与部署流程</text>
  
  <!-- 训练步骤 -->
  <rect x="40" y="265" width="120" height="50" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="100" y="285" text-anchor="middle" fill="#1565C0" font-size="11" font-weight="bold">数据采集</text>
  <text x="100" y="300" text-anchor="middle" fill="#37474F" font-size="9">live 11.4K + spoof 15.2K</text>
  
  <line x1="160" y1="290" x2="190" y2="290" stroke="#90A4AE" stroke-width="1.5"/>
  
  <rect x="190" y="265" width="120" height="50" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="285" text-anchor="middle" fill="#1565C0" font-size="11" font-weight="bold">数据增强</text>
  <text x="250" y="300" text-anchor="middle" fill="#37474F" font-size="9">R/B通道增益模拟AWB</text>
  
  <line x1="310" y1="290" x2="340" y2="290" stroke="#90A4AE" stroke-width="1.5"/>
  
  <rect x="340" y="265" width="120" height="50" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="400" y="285" text-anchor="middle" fill="#1565C0" font-size="11" font-weight="bold">PyTorch 训练</text>
  <text x="400" y="300" text-anchor="middle" fill="#37474F" font-size="9">MobileNetV1 ×0.5 FP32</text>
  
  <line x1="460" y1="290" x2="490" y2="290" stroke="#90A4AE" stroke-width="1.5"/>
  
  <rect x="490" y="265" width="120" height="50" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="550" y="285" text-anchor="middle" fill="#E65100" font-size="11" font-weight="bold">ESP-PPQ 量化</text>
  <text x="550" y="300" text-anchor="middle" fill="#37474F" font-size="9">FP32 → INT8 ~160KB</text>
  
  <line x1="610" y1="290" x2="640" y2="290" stroke="#90A4AE" stroke-width="1.5"/>
  
  <rect x="640" y="265" width="120" height="50" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="700" y="285" text-anchor="middle" fill="#2E7D32" font-size="11" font-weight="bold">ESP-DL 部署</text>
  <text x="700" y="300" text-anchor="middle" fill="#37474F" font-size="9">ESP32-P4 推理 ~40ms</text>
</svg>