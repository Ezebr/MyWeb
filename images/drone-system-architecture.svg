<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- 视觉模块 -->
  <rect x="20" y="50" width="200" height="100" rx="12" fill="url(#grad1)" filter="url(#shadow)"/>
  <text x="120" y="90" text-anchor="middle" fill="white" font-size="16" font-weight="bold">视觉模块</text>
  <text x="120" y="115" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="13">OpenMV / K210</text>
  
  <!-- 箭头 1 -->
  <line x1="230" y1="100" x2="310" y2="100" stroke="#6366F1" stroke-width="3" marker-end="url(#arrow1)"/>
  <text x="270" y="85" text-anchor="middle" fill="#4B5563" font-size="12">UART</text>
  <text x="270" y="100" text-anchor="middle" fill="#6B7280" font-size="11">256000 baud</text>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366F1"/>
    </marker>
  </defs>
  
  <!-- 飞控主控 -->
  <rect x="320" y="50" width="200" height="100" rx="12" fill="url(#grad2)" filter="url(#shadow)"/>
  <text x="420" y="90" text-anchor="middle" fill="white" font-size="16" font-weight="bold">飞控主控</text>
  <text x="420" y="115" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="13">TM4C123 (ARM Cortex-M4F)</text>
  
  <!-- 箭头 2 -->
  <line x1="530" y1="100" x2="610" y2="100" stroke="#059669" stroke-width="3" marker-end="url(#arrow2)"/>
  <text x="570" y="85" text-anchor="middle" fill="#4B5563" font-size="12">PID 输出</text>
  <text x="570" y="100" text-anchor="middle" fill="#6B7280" font-size="11">PWM 信号</text>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>
  
  <!-- 电调/电机 -->
  <rect x="620" y="50" width="160" height="100" rx="12" fill="url(#grad3)" filter="url(#shadow)"/>
  <text x="700" y="90" text-anchor="middle" fill="white" font-size="16" font-weight="bold">电调 / 电机</text>
  <text x="700" y="115" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="13">× 4 通道</text>
</svg>