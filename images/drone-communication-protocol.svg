<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="k210Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowViolet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#DC2626"/>
    </marker>
  </defs>
  
  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" fill="#1F2937" font-size="18" font-weight="bold">K210 视觉端与飞控端通信协议</text>
  
  <!-- K210 视觉模块 -->
  <rect x="30" y="60" width="180" height="280" rx="16" fill="url(#k210Grad)" filter="url(#shadow3)"/>
  <text x="120" y="95" text-anchor="middle" fill="white" font-size="15" font-weight="bold">K210 视觉模块</text>
  
  <rect x="50" y="115" width="140" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="120" y="135" text-anchor="middle" fill="white" font-size="12">YOLOv2 推理</text>
  
  <rect x="50" y="155" width="140" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="120" y="175" text-anchor="middle" fill="white" font-size="12">20帧投票策略</text>
  
  <rect x="50" y="195" width="140" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="120" y="215" text-anchor="middle" fill="white" font-size="12">数据打包</text>
  
  <text x="120" y="260" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">UART 115200</text>
  <text x="120" y="280" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">IO_6=RX, IO_8=TX</text>
  
  <!-- 飞控主控 -->
  <rect x="310" y="60" width="180" height="280" rx="16" fill="url(#fcGrad)" filter="url(#shadow3)"/>
  <text x="400" y="95" text-anchor="middle" fill="white" font-size="15" font-weight="bold">TM4C123 飞控</text>
  
  <rect x="330" y="115" width="140" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="400" y="135" text-anchor="middle" fill="white" font-size="12">帧解析状态机</text>
  
  <rect x="330" y="155" width="140" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="400" y="175" text-anchor="middle" fill="white" font-size="12">BFS 路径规划</text>
  
  <rect x="330" y="195" width="140" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="400" y="215" text-anchor="middle" fill="white" font-size="12">PID 飞行控制</text>
  
  <text x="400" y="260" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">UART3 SDK</text>
  <text x="400" y="280" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">NCLink 协议</text>
  
  <!-- 地面站 -->
  <rect x="590" y="60" width="180" height="280" rx="16" fill="url(#gsGrad)" filter="url(#shadow3)"/>
  <text x="680" y="95" text-anchor="middle" fill="white" font-size="15" font-weight="bold">地面站</text>
  
  <rect x="610" y="115" width="140" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="680" y="135" text-anchor="middle" fill="white" font-size="12">9×7 网格显示</text>
  
  <rect x="610" y="155" width="140" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="680" y="175" text-anchor="middle" fill="white" font-size="12">禁飞区设置</text>
  
  <rect x="610" y="195" width="140" height="30" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="680" y="215" text-anchor="middle" fill="white" font-size="12">动物统计显示</text>
  
  <text x="680" y="260" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">蓝牙/串口</text>
  <text x="680" y="280" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">触摸屏</text>
  
  <!-- 箭头：K210 → 飞控（触发帧） -->
  <line x1="210" y1="250" x2="300" y2="175" stroke="#8B5CF6" stroke-width="2.5" marker-end="url(#arrowViolet)"/>
  <rect x="220" y="190" width="80" height="24" rx="4" fill="white" stroke="#8B5CF6" stroke-width="1"/>
  <text x="260" y="207" text-anchor="middle" fill="#8B5CF6" font-size="10" font-weight="bold">触发帧</text>
  <text x="260" y="222" text-anchor="middle" fill="#6B7280" font-size="9">FF FE ...</text>
  
  <!-- 箭头：飞控 → K210（检测结果） -->
  <line x1="300" y1="225" x2="210" y2="300" stroke="#059669" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="220" y="255" width="80" height="24" rx="4" fill="white" stroke="#059669" stroke-width="1"/>
  <text x="260" y="272" text-anchor="middle" fill="#059669" font-size="10" font-weight="bold">检测结果</text>
  <text x="260" y="287" text-anchor="middle" fill="#6B7280" font-size="9">FF FC ...</text>
  
  <!-- 箭头：飞控 → 地面站 -->
  <line x1="490" y1="175" x2="580" y2="175" stroke="#DC2626" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="535" y="160" text-anchor="middle" fill="#4B5563" font-size="11">方格+动物数据</text>
  
  <!-- 数据帧格式 -->
  <rect x="100" y="360" width="600" height="35" rx="8" fill="#1F2937"/>
  <text x="400" y="383" text-anchor="middle" fill="white" font-size="12">帧头(2B) | 功能字(1B) | 长度(1B) | 数据域(53B) | 校验(1B)</text>
</svg>